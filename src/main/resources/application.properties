spring.application.name=imexcol
server.port=8080

# ============================================================
# Conexion a base de datos SQL Server
# ============================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=imexcol;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Imexcol2026!
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================================
# Inicializacion del esquema (schema.sql)
# ============================================================
# Por defecto Spring Boot solo ejecuta schema.sql en bases embebidas (modo "embedded").
# Cambiar a "always" si se desea que el esquema se cree/actualice en cada arranque.
spring.sql.init.mode=embedded
spring.sql.init.platform=sqlserver
